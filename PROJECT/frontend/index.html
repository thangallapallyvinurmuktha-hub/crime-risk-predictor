<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Risk Projector</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow-y:auto;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    padding:40px 20px;
    position:relative;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating precaution symbols */
.symbol{
    position:absolute;
    font-size:20px;
    color:rgba(255,255,255,0.08);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh) rotate(0deg);}
    100%{transform:translateY(-10vh) rotate(360deg);}
}

/* Main card */
.container{
    max-width:600px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:40px;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
    animation:slideIn 1s ease;
    position:relative;
    z-index:10;
}

@keyframes slideIn{
    from{opacity:0; transform:translateY(50px);}
    to{opacity:1; transform:translateY(0);}
}

/* Heading */
.main-title{
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:32px;
    font-weight:800;
    color:#00f7ff;
    text-shadow:0 0 15px #00f7ff, 0 0 30px #00f7ff;
    margin-bottom:35px;
    animation:titlePulse 2s infinite alternate;
}

@keyframes titlePulse{
    from{ text-shadow:0 0 10px #00f7ff;}
    to{ text-shadow:0 0 40px #00f7ff;}
}

label{
    color:white;
    font-size:14px;
    font-weight:500;
}

select{
    width:100%;
    padding:12px;
    margin:8px 0 20px;
    border:none;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

select:focus{
    transform:scale(1.03);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,80,100,0.8);
}

/* Result */
.result{
    margin-top:30px;
    display:none;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.circle{
    width:220px;
    height:220px;
    border-radius:50%;
    margin:25px auto;
    background:conic-gradient(#ff512f 0deg,#ffffff22 0deg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:700;
    color:#fff;
    animation:glow 2s infinite;
}

@keyframes glow{
    0%{box-shadow:0 0 20px #ff512f;}
    50%{box-shadow:0 0 50px #ff512f;}
    100%{box-shadow:0 0 20px #ff512f;}
}

.risk-label{
    text-align:center;
    font-size:20px;
    font-weight:600;
    color:#ffea00;
}

ul{
    margin-top:15px;
    color:white;
}

.loader{
    text-align:center;
    margin-top:20px;
    display:none;
}

.loader span{
    display:inline-block;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    margin:5px;
    animation:blink 1.4s infinite both;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
    0%{opacity:0.3;}
    20%{opacity:1;}
    100%{opacity:0.3;}
}

</style>
</head>

<body>

<script>
const icons = ["⚠","🚨","🔒","🛡","⚖","👮","🔍","🛑","📢","🚔"];
for(let i=0;i<45;i++){
    let span=document.createElement("span");
    span.className="symbol";
    span.innerText=icons[Math.floor(Math.random()*icons.length)];
    span.style.left=Math.random()*100+"%";
    span.style.animationDuration=(10+Math.random()*15)+"s";
    span.style.fontSize=(14+Math.random()*20)+"px";
    document.body.appendChild(span);
}
</script>

<div class="container">

<h1 class="main-title">Crime Risk Projector</h1>

<label for="city">City</label>
<select id="city" required>
<option value="" disabled selected hidden>-- Select City --</option>
</select>

<label for="crime">Crime Type</label>
<select id="crime" required>
<option value="" disabled selected hidden>-- Select Crime Type --</option>
<option value="Theft">Theft</option>
<option value="Robbery">Robbery</option>
<option value="Assault">Assault</option>
<option value="Rape">Rape</option>
<option value="Murder">Murder</option>
<option value="CyberCrime">CyberCrime</option>
</select>

<label for="gender">Gender</label>
<select id="gender" required>
<option value="" disabled selected hidden>-- Select Gender --</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Others">Others</option>
</select>

<label for="fatal_status">Fatal Status</label>
<select id="fatal_status" required>
<option value="" disabled selected hidden>-- Select Fatal Status --</option>
<option value="Fatal">Fatal</option>
<option value="Non-Fatal">Non-Fatal</option>
</select>

<label for="case_status">Case Status</label>
<select id="case_status" required>
<option value="" disabled selected hidden>-- Select Case Status --</option>
<option value="Pending">Pending</option>
<option value="Closed">Closed</option>
</select>

<button onclick="analyzeRisk()">Analyze Risk</button>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="result" id="resultBox">
<div class="circle" id="riskCircle">0%</div>
<div class="risk-label" id="riskLevel"></div>
<ul id="precautions"></ul>
</div>

</div>

<script>

async function loadCities(){
    const response=await fetch("/cities");
    const cities=await response.json();
    const select=document.getElementById("city");
    cities.forEach(city=>{
        let option=document.createElement("option");
        option.value=city;
        option.textContent=city;
        select.appendChild(option);
    });
}
window.onload=loadCities;

async function analyzeRisk(){

    if(!city.value || !crime.value || !gender.value || !fatal_status.value || !case_status.value){
        alert("Please select all fields");
        return;
    }

    document.getElementById("loader").style.display="block";
    document.getElementById("resultBox").style.display="none";

    const response=await fetch("/calculate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            city:city.value,
            crime:crime.value,
            gender:gender.value,
            fatal_status:fatal_status.value,
            case_status:case_status.value
        })
    });

    const data=await response.json();

    document.getElementById("loader").style.display="none";
    document.getElementById("resultBox").style.display="block";

    const percent=data.exposure_risk_percent;
    const circle=document.getElementById("riskCircle");

    circle.innerText=percent+"%";
    circle.style.background=`conic-gradient(#ff512f ${percent*3.6}deg,#ffffff22 ${percent*3.6}deg)`;

    document.getElementById("riskLevel").innerText=data.risk_level;

    const precautions=document.getElementById("precautions");
    precautions.innerHTML="";
    data.precautions.forEach(p=>{
        let li=document.createElement("li");
        li.textContent=p;
        precautions.appendChild(li);
    });
}

</script>

</body>

</html>
